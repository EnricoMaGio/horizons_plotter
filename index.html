<!DOCTYPE html>
<html>
<head>
    <title>JPL Horizons 3D Plotter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #333; padding: 15px; border-radius: 8px; }
        input, button { padding: 8px; border-radius: 4px; border: none; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #plot { width: 100%; height: 80vh; background: #000; }
    </style>
</head>
<body>

    <h2>JPL Horizons 3D Orbit Plotter</h2>
    
    <div class="controls">
        <input type="text" id="objId" value="-144" placeholder="Target ID (e.g. -144)">
        <input type="text" id="centerId" value="sun" placeholder="Center ID (e.g. sun)">
        <input type="date" id="startDate" value="2020-02-12">
        <input type="date" id="endDate" value="2021-02-10">
        <button onclick="fetchAndPlot()">Plot Trajectory</button>
    </div>

    <div id="plot"></div>

    <script>
async function fetchAndPlot() {
    const id = document.getElementById('objId').value;
    const centerId = document.getElementById('centerId').value;
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    
    // 1. Dynamically build the URL based on user input
    // Added 'CSV=YES' to make parsing easier
    const nasaUrl = `https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='${id}'&OBJ_DATA='NO'&MAKE_EPHEM='YES'&EPHEM_TYPE='VECTORS'&CENTER='500@${centerId}'&START_TIME='${start}'&STOP_TIME='${end}'&STEP_SIZE='1d'&CSV_FORMAT='YES'&VEC_TABLE='1'`;

    const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(nasaUrl);

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error(`Server responded with ${response.status}`);
        
        const data = await response.json();
        if (!data.result) throw new Error("NASA returned no data.");

        const x = [], y = [], z = [], dates = [];

        // 2. Improved Parsing for CSV Output
        const lines = data.result.split('\n');
        let inData = false;

        for (let line of lines) {
            if (line.includes('$$SOE')) { inData = true; continue; }
            if (line.includes('$$EOE')) { inData = false; continue; }
            
            if (inData) {
                const cols = line.split(',');
                if (cols.length >= 4) {
                    // With CSV='YES', the format is: Record#, Calendar Date, X, Y, Z...
                    dates.push(cols[1].trim()); 
                    x.push(parseFloat(cols[2]));
                    y.push(parseFloat(cols[3]));
                    z.push(parseFloat(cols[4]));
                }
            }
        }

        if (x.length === 0) {
            alert("No data points found. Check if the Object ID is correct (e.g., '499' for Mars).");
        }

        plotData(x, y, z, dates, id);
    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    }
}    
        function plotData(x, y, z, dates, id) {
            const trace = {
                x: x, y: y, z: z,
                mode: 'lines',
                type: 'scatter3d',
                text: dates,
                line: { width: 4, color: '#00f2ff' },
                name: `Object ${id}`
            };

            const center = {
                x: [0], y: [0], z: [0],
                mode: 'markers',
                type: 'scatter3d',
                marker: { size: 4, color: 'white' },
                name:  `Object ${centerId}`
            };


            const layout = {
                paper_bgcolor: '#050505', margin: {l:0, r:0, b:0, t:0},
            uirevision: 'constant',
            scene: {
                xaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'X [km]' },
                yaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'Y [km]' },
                zaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'Z [km]' },
                aspectmode: 'data'
            },
                legend: { font: { color: 'white' } },
showlegend: true
            };

            Plotly.newPlot('plot', [center, trace], layout);
        }

        // Run once on load
        fetchAndPlot();
    </script>
</body>
</html>
