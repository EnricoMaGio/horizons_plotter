<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPL Horizons 3D Plotter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-color: #161b22;
            --accent-color: #00d2ff;
            --accent-hover: #0099ff;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        body, html { height: 100%; margin: 0; overflow: hidden; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; }

        .sidebar {
            width: 320px; min-width: 320px; background: var(--panel-color);
            border-right: 1px solid var(--border-color); padding: 24px;
            display: flex; flex-direction: column; gap: 18px; overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3); z-index: 10;
        }

        h2 { font-size: 1.1rem; margin: 0 0 5px 0; color: var(--accent-color); letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.85rem; font-weight: 600; }
        .input-group span { font-size: 0.72rem; color: var(--text-muted); line-height: 1.2; }

        input, select { padding: 10px; background: #0d1117; border: 1px solid var(--border-color); border-radius: 6px; color: white; font-size: 0.9rem; }
        .step-row { display: flex; gap: 5px; }
        #stepVal { width: 60px; } #stepUnit { flex-grow: 1; }

        button { background: var(--accent-color); color: #000; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: var(--accent-hover); }

        .main-content { flex-grow: 1; position: relative; background: #000; min-width: 0; min-height: 0; display: flex; }
        #plot { flex: 1; width: 100%; height: 100%; }

        #status { position: absolute; top: 20px; right: 20px; padding: 8px 15px; background: rgba(0,0,0,0.8); border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--border-color); color: var(--accent-color); z-index: 100; }

        #selectionOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .selection-box { background: var(--panel-color); padding: 30px; border-radius: 12px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; border: 1px solid var(--border-color); }
        .selection-box h3 { color: var(--accent-color); margin-top: 0; }
        .object-item { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; background: #0d1117; color: var(--text-main); border: 1px solid var(--border-color); cursor: pointer; border-radius: 6px; }
        .object-item:hover { border-color: var(--accent-color); background: #1c2128; }
        .close-btn { background: #444; color: white; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Horizons 3D</h2>
        
        <div class="input-group">
            <label for="objId">Target Object</label>
            <span>Target name or ID (e.g., 'Mars' or '-144').</span>
            <input type="text" id="objId" value="-144">
        </div>

        <div class="input-group">
            <label for="centId">Coordinate Center</label>
            <span>Origin point (e.g., 'Sun' or 'Earth').</span>
            <input type="text" id="centId" value="Sun">
        </div>

        <div class="input-group">
            <label for="refPlane">Reference Plane</label>
            <select id="refPlane">
                <option value="ECLIPTIC" selected>Ecliptic</option>
                <option value="FRAME">Frame (Equator)</option>
                <option value="BODY EQUATOR">Body Equator</option>
            </select>
        </div>

        <div class="input-group">
            <label for="startDate">Start Date/Time</label>
            <input type="text" id="startDate" value="2020-02-12 00:00:00.0000">
        </div>

        <div class="input-group">
            <label for="endDate">End Date/Time</label>
            <input type="text" id="endDate" value="2021-02-10 00:00:00.0000">
        </div>

        <div class="input-group">
            <label>Step Size</label>
            <div class="step-row">
                <input type="number" id="stepVal" value="1">
                <select id="stepUnit">
                    <option value="MINUTES">Min</option>
                    <option value="HOURS">Hrs</option>
                    <option value="DAYS" selected>Days</option>
                </select>
            </div>
        </div>

        <button onclick="fetchAndPlot()">Generate Trajectory</button>
    </div>

    <div class="main-content">
        <div id="status">System Ready</div>
        <div id="plot"></div>
    </div>

    <div id="selectionOverlay">
        <div class="selection-box">
            <h3 id="selectionTitle">Matches Found</h3>
            <p id="selectionText" style="color: var(--text-muted); font-size: 0.9rem;"></p>
            <div id="objectList"></div>
            <button class="close-btn" onclick="document.getElementById('selectionOverlay').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        const plotDiv = document.getElementById('plot');
        window.addEventListener('resize', () => Plotly.Plots.resize(plotDiv));

        async function fetchAndPlot() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Fetching Data...";
            
            const targetId = document.getElementById('objId').value;
            const centerId = document.getElementById('centId').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const step = `${document.getElementById('stepVal').value} ${document.getElementById('stepUnit').value}`;
            const refPlane = document.getElementById('refPlane').value;

            // 1. Check Center Ambiguity
            const centerCheckUrl = `https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='${centerId}'`;
            try {
                const cRes = await fetch("https://corsproxy.io/?" + encodeURIComponent(centerCheckUrl));
                const cData = await cRes.json();
                if (cData.result && cData.result.includes("Number of matches")) {
                    showSelection(cData.result, "centId", "Select Center Body");
                    statusEl.innerText = "Select Center Body...";
                    return;
                }
            } catch(e) {}

            // 2. Fetch Vectors with quoted REF_PLANE to fix "Too many constants" error
            const nasaUrl = `https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='${targetId}'&OBJ_DATA='NO'&MAKE_EPHEM='YES'&EPHEM_TYPE='VECTORS'&CENTER='@${centerId}'&REF_PLANE='${refPlane}'&START_TIME='${start}'&STOP_TIME='${end}'&STEP_SIZE='${step}'&CSV_FORMAT='YES'&VEC_TABLE='1'`;
            
            try {
                const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(nasaUrl));
                const data = await response.json();

                // 3. Check Target Ambiguity
                if (data.result && data.result.includes("Number of matches")) {
                    showSelection(data.result, "objId", "Select Target Object");
                    statusEl.innerText = "Select Target...";
                    return;
                }

                if (data.error || (data.result && data.result.includes("INPUT ERROR"))) {
                    throw new Error(data.error || "NASA Horizons Input Error");
                }

                let targetName = targetId;
                let centerName = centerId;
                
                const tNameMatch = data.result.match(/Target body name:\s+([^({\n]+)/);
                if (tNameMatch) targetName = tNameMatch[1].trim();

                const cNameMatch = data.result.match(/Center body name:\s+([^({\n]+)/);
                if (cNameMatch) centerName = cNameMatch[1].trim();

                const x = [], y = [], z = [], dates = [];
                const lines = data.result.split('\n');
                let inData = false;
                for (let line of lines) {
                    if (line.includes('$$SOE')) { inData = true; continue; }
                    if (line.includes('$$EOE')) { inData = false; continue; }
                    if (inData) {
                        const cols = line.split(',');
                        if (cols.length >= 4) {
                            dates.push(cols[1].trim()); 
                            x.push(parseFloat(cols[2]));
                            y.push(parseFloat(cols[3]));
                            z.push(parseFloat(cols[4]));
                        }
                    }
                }

                if (x.length === 0) throw new Error("No data found. Check parameters.");

                plotData(x, y, z, dates, targetName, centerName);
                statusEl.innerText = `Viewing: ${targetName}`;
            } catch (err) {
                statusEl.innerText = "Error";
                alert(err.message);
            }
        }

        function showSelection(resultText, targetFieldId, title) {
            const listDiv = document.getElementById('objectList');
            document.getElementById('selectionTitle').innerText = title;
            document.getElementById('selectionText').innerText = `Matches found for your input. Please choose one:`;
            listDiv.innerHTML = "";
            
            const lines = resultText.split('\n');
            lines.forEach(line => {
                const match = line.match(/^\s*(-?\d+)\s+(.+)$/);
                if (match) {
                    const btn = document.createElement('button');
                    btn.className = "object-item";
                    btn.innerText = `ID: ${match[1]} — ${match[2].trim()}`;
                    btn.onclick = () => {
                        document.getElementById('selectionOverlay').style.display = 'none';
                        document.getElementById(targetFieldId).value = match[1];
                        fetchAndPlot();
                    };
                    listDiv.appendChild(btn);
                }
            });
            document.getElementById('selectionOverlay').style.display = 'flex';
        }

        function plotData(x, y, z, dates, tName, cName) {
            const combined = [...x, ...y, ...z];
            const maxVal = Math.max(...combined), minVal = Math.min(...combined);
            const midX = (Math.max(...x) + Math.min(...x)) / 2;
            const midY = (Math.max(...y) + Math.min(...y)) / 2;
            const midZ = (Math.max(...z) + Math.min(...z)) / 2;
            const range = (maxVal - minVal) / 2;

            const trace = {
                x: x, y: y, z: z, mode: 'lines', type: 'scatter3d',
                text: dates, line: { width: 3, color: '#00d2ff' }, name: tName
            };

            const center = {
                x: [0], y: [0], z: [0], mode: 'markers', type: 'scatter3d',
                marker: { size: 4, color: '#fff', line: { color: '#00d2ff', width: 1 } }, name: cName
            };

            Plotly.newPlot('plot', [center, trace], {
                paper_bgcolor: 'rgba(0,0,0,0)', margin: {l:0, r:0, b:0, t:0},
                scene: {
                    aspectmode: 'scene',
                    xaxis: { range: [midX - range, midX + range], title: 'X (km)', gridcolor: '#1a1a1a' },
                    yaxis: { range: [midY - range, midY + range], title: 'Y (km)', gridcolor: '#1a1a1a' },
                    zaxis: { range: [midZ - range, midZ + range], title: 'Z (km)', gridcolor: '#1a1a1a' }
                },
                legend: { font: { color: 'white' }, x: 0, y: 1 },
                uirevision: 'true'
            }, { responsive: true });
        }

        fetchAndPlot();
    </script>
</body>
</html>
