<!DOCTYPE html>
<html>
<head>
    <title>JPL Horizons 3D Plotter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #333; padding: 15px; border-radius: 8px; }
        input, button { padding: 8px; border-radius: 4px; border: none; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #plot { width: 100%; height: 80vh; background: #000; }

        /* Selection Overlay Styles */
        #selectionOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .selection-box {
            background: #222;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #444;
        }
        .object-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px;
            margin: 5px 0;
            background: #333;
            color: #00f2ff;
            border: 1px solid #444;
            cursor: pointer;
            border-radius: 4px;
        }
        .object-item:hover { background: #444; }
        .close-btn { background: #cc0000; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

    <h2>JPL Horizons 3D Orbit Plotter</h2>
    
    <div class="controls">
        <input type="text" id="objId" value="-144" placeholder="Target ID (e.g. -144)">
        <input type="text" id="centId" value="sun" placeholder="Center ID (e.g. sun)">
        <input type="date" id="startDate" value="2020-02-12">
        <input type="date" id="endDate" value="2021-02-10">
        <input type="text" id="stepsize" value="1 DAYS" placeholder="Stepsize">
        <button onclick="fetchAndPlot()">Plot Trajectory</button>
    </div>

    <div id="plot"></div>

    <div id="selectionOverlay">
        <div class="selection-box">
            <h3>Multiple Matches Found</h3>
            <p>Select the exact object you wish to plot:</p>
            <div id="objectList"></div>
            <button class="close-btn" onclick="document.getElementById('selectionOverlay').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
async function fetchAndPlot(forcedId = null) {
    // If we passed a forcedId from the selection list, use that; otherwise use the input value
    const id = forcedId || document.getElementById('objId').value;
    const centerId = document.getElementById('centId').value;
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const step = document.getElementById('stepsize').value;

    const nasaUrl = `https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='${id}'&OBJ_DATA='NO'&MAKE_EPHEM='YES'&EPHEM_TYPE='VECTORS'&CENTER='500@${centerId}'&START_TIME='${start} UTC'&STOP_TIME='${end}'&STEP_SIZE='${step}'&CSV_FORMAT='YES'&VEC_TABLE='1'`;
    const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(nasaUrl);

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error(`Server responded with ${response.status}`);
        
        const data = await response.json();

        // 1. IMPROVED AMBIGUOUS HANDLING
        if (data.result && data.result.includes("Number of matches")) {
            showObjectSelection(data.result);
            return;
        }

        if (!data.result || data.result.includes("No object found")) {
            throw new Error("NASA could not find that object.");
        }

        const x = [], y = [], z = [], dates = [];

        let displayName = `Object ${id}`; 
        let nameMatch = data.result.match(/Target body name:\s+([^({\n]+)/);
        if (nameMatch && nameMatch[1]) {
            displayName = nameMatch[1].trim();
        }

        let centerName = `Object ${centerId}`; 
        nameMatch = data.result.match(/Center body name:\s+([^({\n]+)/);
        if (nameMatch && nameMatch[1]) {
            centerName = nameMatch[1].trim();
        }

        const lines = data.result.split('\n');
        let inData = false;

        for (let line of lines) {
            if (line.includes('$$SOE')) { inData = true; continue; }
            if (line.includes('$$EOE')) { inData = false; continue; }
            
            if (inData) {
                const cols = line.split(',');
                if (cols.length >= 4) {
                    dates.push(cols[1].trim()); 
                    x.push(parseFloat(cols[2]));
                    y.push(parseFloat(cols[3]));
                    z.push(parseFloat(cols[4]));
                }
            }
        }

        if (x.length === 0) {
            alert("No data points found. Check if the Object ID is correct.");
        }

        plotData(x, y, z, dates, displayName, centerName);
    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    }
}

// Function to parse the NASA "Ambiguous Search" text and show the buttons
function showObjectSelection(resultText) {
    const listDiv = document.getElementById('objectList');
    listDiv.innerHTML = ""; // Clear old list
    
    // Look for lines that contain an ID followed by the object name (typical NASA formatting)
    // Matches patterns like "  499  Mars"
    const lines = resultText.split('\n');
    const matches = [];

    lines.forEach(line => {
        const match = line.match(/^\s*(-?\d+)\s+(.+)$/);
        if (match) {
            matches.push({ id: match[1], name: match[2].trim() });
        }
    });

    if (matches.length === 0) {
        alert("Multiple matches found, but they couldn't be parsed automatically. Try entering the exact ID.");
        return;
    }

    matches.forEach(item => {
        const btn = document.createElement('button');
        btn.className = "object-item";
        btn.innerText = `[ID: ${item.id}] ${item.name}`;
        btn.onclick = () => {
            document.getElementById('selectionOverlay').style.display = 'none';
            document.getElementById('objId').value = item.id; // Update input field
            fetchAndPlot(item.id); // Plot the specific selection
        };
        listDiv.appendChild(btn);
    });

    document.getElementById('selectionOverlay').style.display = 'flex';
}

function plotData(x, y, z, dates, displayName, centerName) {
    const trace = {
        x: x, y: y, z: z,
        mode: 'lines',
        type: 'scatter3d',
        text: dates,
        line: { width: 4, color: '#00f2ff' },
        name: displayName
    };

    const center = {
        x: [0], y: [0], z: [0],
        mode: 'markers',
        type: 'scatter3d',
        marker: { size: 4, color: 'white' },
        name: centerName
    };

    const layout = {
        paper_bgcolor: '#050505', 
        margin: {l:0, r:0, b:0, t:0},
        uirevision: 'constant',
        scene: {
            xaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'X [km]' },
            yaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'Y [km]' },
            zaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'Z [km]' },
            aspectmode: 'data'
        },
        legend: { font: { color: 'white' } },
        showlegend: true
    };

    Plotly.newPlot('plot', [center, trace], layout);
}

fetchAndPlot();
    </script>
</body>
</html>
