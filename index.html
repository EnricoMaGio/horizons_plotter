<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizons 3D | Orbital Dynamics</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020408;
            --panel-glass: rgba(13, 17, 23, 0.75);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { height: 100%; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-main); }
        
        /* Sidebar Glass Effect */
        .sidebar {
            width: 340px; min-width: 340px; height: 100vh;
            background: var(--panel-glass);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--border);
            padding: 30px;
            display: flex; flex-direction: column;
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        h2 { 
            font-size: 0.9rem; margin: 0 0 25px 0; color: var(--accent); 
            letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
            border-left: 3px solid var(--accent); padding-left: 15px;
        }

        .input-group { margin-bottom: 22px; display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-main); }
        .input-group span { font-size: 0.75rem; color: var(--text-dim); line-height: 1.4; }

        input, select { 
            padding: 12px; background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--border); border-radius: 8px; 
            color: #fff; font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .step-row { display: flex; gap: 8px; }
        #stepVal { width: 70px; }

        button { 
            background: linear-gradient(135deg, #00d2ff 0%, #0072ff 100%);
            color: #000; padding: 15px; border-radius: 8px; border: none; 
            cursor: pointer; font-weight: 700; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); filter: brightness(1.1); }

        /* HUD Status */
        #status { 
            position: absolute; top: 25px; right: 25px; 
            padding: 10px 18px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); border-radius: 30px;
            font-size: 0.75rem; border: 1px solid var(--accent);
            color: var(--accent); z-index: 100;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
        }

        .main-content { flex: 1; position: relative; background: #000; }
        #plot { width: 100%; height: 100%; }

        /* Overlay Styling */
        #selectionOverlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 2000; justify-content: center; align-items: center; 
        }
        .selection-box { 
            background: #161b22; padding: 35px; border-radius: 15px; 
            max-width: 550px; width: 90%; max-height: 80vh; overflow-y: auto;
            border: 1px solid var(--border); box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        .object-item { 
            display: block; width: 100%; text-align: left; padding: 14px; 
            margin: 10px 0; background: #0d1117; color: var(--text-main); 
            border: 1px solid var(--border); cursor: pointer; border-radius: 8px; 
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
        }
        .object-item:hover { border-color: var(--accent); background: #1c2128; color: var(--accent); }
        .close-btn { background: #30363d; color: #fff; margin-top: 15px; width: 100%; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Horizons 3D</h2>
        
        <div class="input-group">
            <label for="objId">Target Object</label>
            <span>Object name or ID (e.g., 'Solar Orbiter' or '-144').</span>
            <input type="text" id="objId" value="Solar Orbiter">
        </div>

        <div class="input-group">
            <label for="centId">Coordinate Center</label>
            <span>Origin of the grid (e.g., 'Sun' or 'Earth' or '399').</span>
            <input type="text" id="centId" value="Sun">
        </div>

        <div class="input-group">
            <label for="refPlane">Reference Plane</label>
            <span>Plane for X-Y orientation.</span>
            <select id="refPlane">
                <option value="BODY EQUATOR">Body Equator</option>
                <option value="ECLIPTIC" selected>Ecliptic</option>
                <option value="FRAME">Frame (Equator)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="startDate">Start Date/Time</label>
            <span>UTC format (YYYY-MM-DD HH:MM:SS).</span>
            <input type="text" id="startDate" value="2020-02-10 00:00:00">
        </div>

        <div class="input-group">
            <label for="endDate">End Date/Time</label>
            <span>Ending time for trajectory.</span>
            <input type="text" id="endDate" value="2021-02-10 00:00:00">
        </div>

        <div class="input-group">
            <label>Step Size</label>
            <span>Frequency of data points.</span>
            <div class="step-row">
                <input type="number" id="stepVal" value="1">
                <select id="stepUnit">
                    <option value="MINUTES">Min</option>
                    <option value="HOURS">Hrs</option>
                    <option value="DAYS" selected>Days</option>
                </select>
            </div>
        </div>

        <button onclick="fetchAndPlot()">Generate Trajectory</button>
    </div>

    <div class="main-content">
        <div id="status">SYSTEM READY</div>
        <div id="plot"></div>
    </div>

    <div id="selectionOverlay">
        <div class="selection-box">
            <h3 id="selectionTitle" style="color: var(--accent); margin-top:0;">Matches Found</h3>
            <p id="selectionText" style="color: var(--text-dim); font-size: 0.9rem;"></p>
            <div id="objectList"></div>
            <button class="close-btn" onclick="document.getElementById('selectionOverlay').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        const plotDiv = document.getElementById('plot');
        window.addEventListener('resize', () => Plotly.Plots.resize(plotDiv));

        async function fetchAndPlot() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "LINKING TO JPL...";
            
            const targetInput = document.getElementById('objId').value;
            const centerInput = document.getElementById('centId').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const step = `${document.getElementById('stepVal').value} ${document.getElementById('stepUnit').value}`;
            const refPlaneRaw = document.getElementById('refPlane').value;

            try {
                // Ambiguity Check for Center
                const cCheckUrl = `https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='${encodeURIComponent(centerInput)}'`;
                const cRes = await fetch("https://corsproxy.io/?" + encodeURIComponent(cCheckUrl));
                const cData = await cRes.json();
                if (cData.result && cData.result.includes("Number of matches")) {
                    showSelection(cData.result, "centId", "Select Center Body");
                    statusEl.innerText = "WAITING FOR INPUT...";
                    return;
                }

                // Main API Data Call
                const cleanRefPlane = refPlaneRaw.charAt(0);
                const nasaUrl = `https://ssd.jpl.nasa.gov/api/horizons.api?format=json` + 
                    `&COMMAND='${targetInput}'` +
                    `&OBJ_DATA='NO'` +
                    `&MAKE_EPHEM='YES'` +
                    `&EPHEM_TYPE='VECTORS'` +
                    `&CENTER='@${centerInput}'` +
                    `&START_TIME='${start} UTC'` +
                    `&STOP_TIME='${end}'` +
                    `&STEP_SIZE='${step}'` +
                    `&CSV_FORMAT='YES'` +
                    `&VEC_TABLE='1'` +
                    `&REF_PLANE='${cleanRefPlane}'`;

                const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(nasaUrl);
                const response = await fetch(proxyUrl);
                const data = await response.json();

                if (data.result && data.result.includes("Number of matches")) {
                    showSelection(data.result, "objId", "Select Target Object");
                    statusEl.innerText = "WAITING FOR INPUT...";
                    return;
                }

                if (data.result && (data.result.includes("INPUT ERROR") || data.result.includes("Too many constants"))) {
                    throw new Error(`JPL API Error. Please check your IDs or dates.`);
                }

                let targetName = targetInput, centerName = centerInput;
                const tNameMatch = data.result.match(/Target body name:\s+([^({\n]+)/);
                if (tNameMatch) targetName = tNameMatch[1].trim();
                const cNameMatch = data.result.match(/Center body name:\s+([^({\n]+)/);
                if (cNameMatch) centerName = cNameMatch[1].trim();

                const x = [], y = [], z = [], dates = [];
                const lines = data.result.split('\n');
                let inData = false;
                for (let line of lines) {
                    if (line.includes('$$SOE')) { inData = true; continue; }
                    if (line.includes('$$EOE')) { inData = false; continue; }
                    if (inData) {
                        const cols = line.split(',');
                        if (cols.length >= 4) {
                            dates.push(cols[1].trim()); 
                            x.push(parseFloat(cols[2]));
                            y.push(parseFloat(cols[3]));
                            z.push(parseFloat(cols[4]));
                        }
                    }
                }

                if (x.length === 0) throw new Error(`No vector data found for specified range.`);

                plotData(x, y, z, dates, targetName, centerName);
                statusEl.innerText = `VIEWING: ${targetName.toUpperCase()}`;

            } catch (err) {
                statusEl.innerText = "ERROR";
                alert(err.message);
            }
        }

        function showSelection(resultText, targetFieldId, title) {
            const listDiv = document.getElementById('objectList');
            document.getElementById('selectionTitle').innerText = title;
            document.getElementById('selectionText').innerText = `Multiple matches found for "${document.getElementById(targetFieldId).value}":`;
            listDiv.innerHTML = "";
            const lines = resultText.split('\n');
            lines.forEach(line => {
                const match = line.match(/^\s*(-?\d+)\s+(.+)$/);
                if (match) {
                    const btn = document.createElement('button');
                    btn.className = "object-item";
                    btn.innerText = `ID: ${match[1]} — ${match[2].trim()}`;
                    btn.onclick = () => {
                        document.getElementById('selectionOverlay').style.display = 'none';
                        document.getElementById(targetFieldId).value = match[1];
                        fetchAndPlot();
                    };
                    listDiv.appendChild(btn);
                }
            });
            document.getElementById('selectionOverlay').style.display = 'flex';
        }

        function plotData(x, y, z, dates, tName, cName) {
            const combined = [...x, ...y, ...z];
            const maxVal = Math.max(...combined), minVal = Math.min(...combined);
            const midX = (Math.max(...x) + Math.min(...x)) / 2;
            const midY = (Math.max(...y) + Math.min(...y)) / 2;
            const midZ = (Math.max(...z) + Math.min(...z)) / 2;
            const range = (maxVal - minVal) / 2;

            const trace = {
                x: x, y: y, z: z, mode: 'lines', type: 'scatter3d',
                text: dates, line: { width: 4, color: '#00d2ff' }, name: tName,
                hoverlabel: { bgcolor: '#0b0e14', font: { color: '#fff', family: 'JetBrains Mono' } }
            };

            const center = {
                x: [0], y: [0], z: [0], mode: 'markers', type: 'scatter3d',
                marker: { size: 6, color: '#fff', line: { color: '#00d2ff', width: 2 } }, name: cName
            };

            Plotly.newPlot('plot', [center, trace], {
                paper_bgcolor: 'rgba(0,0,0,0)', margin: {l:0, r:0, b:0, t:0},
                scene: {
                    aspectmode: 'cube',
                    xaxis: { range: [midX - range, midX + range], title: 'X (km)', gridcolor: '#1a1a1a', zerolinecolor: '#333' },
                    yaxis: { range: [midY - range, midY + range], title: 'Y (km)', gridcolor: '#1a1a1a', zerolinecolor: '#333' },
                    zaxis: { range: [midZ - range, midZ + range], title: 'Z (km)', gridcolor: '#1a1a1a', zerolinecolor: '#333' }
                },
                legend: { font: { color: 'white', size: 11 }, x: 0.1, y: 0.9 },
                uirevision: 'true'
            }, { responsive: true, displaylogo: false });
        }

        fetchAndPlot();
    </script>
</body>
</html>
