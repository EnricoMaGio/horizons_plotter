<!DOCTYPE html>
<html>
<head>
    <title>JPL Horizons 3D Plotter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #333; padding: 15px; border-radius: 8px; }
        input, button { padding: 8px; border-radius: 4px; border: none; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #plot { width: 100%; height: 80vh; background: #000; }
    </style>
</head>
<body>

    <h2>JPL Horizons 3D Orbit Plotter</h2>
    
    <div class="controls">
        <input type="text" id="objId" value="-144" placeholder="Object ID (e.g. -144)">
        <input type="date" id="startDate" value="2020-02-10">
        <input type="date" id="endDate" value="2021-02-10">
        <button onclick="fetchAndPlot()">Plot Trajectory</button>
    </div>

    <div id="plot"></div>

    <script>
async function fetchAndPlot() {
    const id = document.getElementById('objId').value;
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    
    // 1. Construct the URL based on the version you confirmed works
    // Note: We use format=json so the script can read it easily
    const nasaUrl = `https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='${id}'&OBJ_DATA='NO'&MAKE_EPHEM='YES'&EPHEM_TYPE='VECTORS'&CENTER='@10'&START_TIME='${start}'&STOP_TIME='${end}'&STEP_SIZE='1d'&OUT_UNITS='km'`;

    const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(nasaUrl);

    try {
        const response = await fetch(proxyUrl);
        const wrapper = await response.json();
        const data = JSON.parse(wrapper.contents);

        if (!data.result) throw new Error("NASA Error: " + data.message);

        const lines = data.result.split('\n');
        let inData = false;
        
        // --- INITIALIZE ALL ARRAYS HERE ---
        const x = [];
        const y = [];
        const z = [];
        const dates = []; // <--- THIS WAS MISSING OR SCOPED WRONGLY

        lines.forEach(line => {
            if (line.includes('$$SOE')) { inData = true; return; }
            if (line.includes('$$EOE')) { inData = false; return; }
            
            if (inData) {
                // JPL Vector data is comma-separated
                const cols = line.split(',').map(s => s.trim());
                
                if (cols.length >= 5) {
                    const xVal = parseFloat(cols[2]);
                    const yVal = parseFloat(cols[3]);
                    const zVal = parseFloat(cols[4]);

                    if (!isNaN(xVal)) {
                        dates.push(cols[1]); // Grabs the Date string
                        x.push(xVal);
                        y.push(yVal);
                        z.push(zVal);
                    }
                }
            }
        });

        if (x.length === 0) {
            alert("No numeric data found. Check the console for the raw NASA response.");
            console.log("Raw Result:", data.result);
            return;
        }

        // Pass the arrays to the plotting function
        plotData(x, y, z, dates, id);

    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    }
}

function plotData(x, y, z, dates, id) {
    const trace = {
        x: x, y: y, z: z,
        mode: 'lines',
        type: 'scatter3d',
        text: dates, // Now 'dates' is defined and passed in!
        line: { width: 4, color: '#00f2ff' },
        name: `Object ${id}`
    };

    const sun = {
        x: [0], y: [0], z: [0],
        mode: 'markers',
        type: 'scatter3d',
        marker: { size: 10, color: 'yellow' },
        name: 'Sun'
    };

    const layout = {
        title: `Orbit of ${id}`,
        scene: {
            xaxis: { title: 'X (AU)' },
            yaxis: { title: 'Y (AU)' },
            zaxis: { title: 'Z (AU)' }
        },
        paper_bgcolor: '#1a1a1a',
        font: { color: 'white' }
    };

    Plotly.newPlot('plot', [trace, sun], layout);
}
        // Run once on load
        fetchAndPlot();
    </script>
</body>
</html>
