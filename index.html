<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPL Horizons 3D Plotter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-color: #161b22;
            --accent-color: #00d2ff;
            --accent-hover: #0099ff;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        body, html { 
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            display: flex;
        }

        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--panel-color);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        h2 { 
            font-size: 1.1rem; 
            margin: 0 0 5px 0;
            color: var(--accent-color);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-group span {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.2;
        }

        .step-row {
            display: flex;
            gap: 5px;
        }

        input, select { 
            padding: 10px; 
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 0.9rem;
        }

        #stepVal { width: 60px; }
        #stepUnit { flex-grow: 1; }

        button { 
            background: var(--accent-color); 
            color: #000; 
            padding: 12px;
            border-radius: 6px; 
            border: none;
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-hover); }

        .main-content {
            flex-grow: 1;
            position: relative;
            background: #000;
            min-width: 0; 
            min-height: 0;
            display: flex;
        }

        #plot { flex: 1; width: 100%; height: 100%; }

        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            z-index: 100;
        }

        #selectionOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .selection-box {
            background: var(--panel-color);
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }
        .object-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px;
            margin: 8px 0;
            background: #0d1117;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            cursor: pointer;
            border-radius: 6px;
        }
        .object-item:hover { border-color: var(--accent-color); background: #1c2128; }
        .close-btn { background: #444; color: white; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Horizons 3D</h2>
        
        <div class="input-group">
            <label for="objId">Target Object ID</label>
            <span>JPL Command ID (e.g., -144 or 499).</span>
            <input type="text" id="objId" value="-144">
        </div>

        <div class="input-group">
            <label for="centId">Coordinate Center</label>
            <span>Origin point (e.g., 'sun' or 'earth').</span>
            <input type="text" id="centId" value="sun">
        </div>

        <div class="input-group">
            <label for="refPlane">Reference Plane</label>
            <span>Coordinate system orientation.</span>
            <select id="refPlane">
                <option value="ECLIPTIC" selected>Ecliptic (Earth Orbit Plane)</option>
                <option value="FRAME">Frame (Earth Equator)</option>
                <option value="BODY EQUATOR">Body Equator (Target Center)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="startDate">Start Date & Time</label>
            <span>YYYY-MM-DD HH:MM:SS.SSSS</span>
            <input type="text" id="startDate" value="2020-02-12 00:00:00.0000">
        </div>

        <div class="input-group">
            <label for="endDate">End Date & Time</label>
            <span>YYYY-MM-DD HH:MM:SS.SSSS</span>
            <input type="text" id="endDate" value="2021-02-10 00:00:00.0000">
        </div>

        <div class="input-group">
            <label>Step Size</label>
            <span>Frequency of data points.</span>
            <div class="step-row">
                <input type="number" id="stepVal" value="1" min="1">
                <select id="stepUnit">
                    <option value="MINUTES">Minutes</option>
                    <option value="HOURS">Hours</option>
                    <option value="DAYS" selected>Days</option>
                    <option value="MONTHS">Months</option>
                    <option value="YEARS">Years</option>
                </select>
            </div>
        </div>

        <button onclick="fetchAndPlot()">Generate Trajectory</button>
        
        <div style="margin-top: auto; font-size: 0.7rem; color: var(--text-muted);">
            NASA JPL Horizons System
        </div>
    </div>

    <div class="main-content">
        <div id="status">System Ready</div>
        <div id="plot"></div>
    </div>

    <div id="selectionOverlay">
        <div class="selection-box">
            <h3>Multiple Matches Found</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Select the correct object to plot:</p>
            <div id="objectList"></div>
            <button class="close-btn" onclick="document.getElementById('selectionOverlay').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        const plotDiv = document.getElementById('plot');
        window.addEventListener('resize', () => Plotly.Plots.resize(plotDiv));

        async function fetchAndPlot(forcedId = null) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Fetching Data...";
            
            const id = forcedId || document.getElementById('objId').value;
            const centerId = document.getElementById('centId').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            
            // Combine numerical value and dropdown unit
            const stepVal = document.getElementById('stepVal').value;
            const stepUnit = document.getElementById('stepUnit').value;
            const step = `${stepVal} ${stepUnit}`;
            
            const refPlane = document.getElementById('refPlane').value;

            const nasaUrl = `https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='${id}'&OBJ_DATA='NO'&MAKE_EPHEM='YES'&EPHEM_TYPE='VECTORS'&CENTER='500@${centerId}'&REF_PLANE='${refPlane}'&START_TIME='${start}'&STOP_TIME='${end}'&STEP_SIZE='${step}'&CSV_FORMAT='YES'&VEC_TABLE='1'`;
            const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(nasaUrl);

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();

                if (data.result && data.result.includes("Number of matches")) {
                    showObjectSelection(data.result);
                    statusEl.innerText = "Awaiting Selection...";
                    return;
                }

                if (!data.result || data.result.includes("No object found")) {
                    throw new Error("NASA could not find that object.");
                }

                const x = [], y = [], z = [], dates = [];
                let displayName = `Object ${id}`; 
                let nameMatch = data.result.match(/Target body name:\s+([^({\n]+)/);
                if (nameMatch && nameMatch[1]) displayName = nameMatch[1].trim();

                let centerName = `Object ${centerId}`; 
                nameMatch = data.result.match(/Center body name:\s+([^({\n]+)/);
                if (nameMatch && nameMatch[1]) centerName = nameMatch[1].trim();

                const lines = data.result.split('\n');
                let inData = false;
                for (let line of lines) {
                    if (line.includes('$$SOE')) { inData = true; continue; }
                    if (line.includes('$$EOE')) { inData = false; continue; }
                    if (inData) {
                        const cols = line.split(',');
                        if (cols.length >= 4) {
                            dates.push(cols[1].trim()); 
                            x.push(parseFloat(cols[2]));
                            y.push(parseFloat(cols[3]));
                            z.push(parseFloat(cols[4]));
                        }
                    }
                }

                plotData(x, y, z, dates, displayName, centerName);
                statusEl.innerText = `Viewing: ${displayName}`;
                
            } catch (err) {
                statusEl.innerText = "Error Loading Data";
                alert(err.message);
            }
        }

        function showObjectSelection(resultText) {
            const listDiv = document.getElementById('objectList');
            listDiv.innerHTML = "";
            const lines = resultText.split('\n');
            const matches = [];

            lines.forEach(line => {
                const match = line.match(/^\s*(-?\d+)\s+(.+)$/);
                if (match) matches.push({ id: match[1], name: match[2].trim() });
            });

            matches.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "object-item";
                btn.innerText = `ID: ${item.id} — ${item.name}`;
                btn.onclick = () => {
                    document.getElementById('selectionOverlay').style.display = 'none';
                    document.getElementById('objId').value = item.id;
                    fetchAndPlot(item.id);
                };
                listDiv.appendChild(btn);
            });
            document.getElementById('selectionOverlay').style.display = 'flex';
        }

        function plotData(x, y, z, dates, displayName, centerName) {
            const trace = {
                x: x, y: y, z: z,
                mode: 'lines',
                type: 'scatter3d',
                hoverinfo: 'text',
                text: dates,
                line: { width: 3, color: '#00d2ff' },
                name: displayName
            };

            const center = {
                x: [0], y: [0], z: [0],
                mode: 'markers',
                type: 'scatter3d',
                marker: { size: 3, color: '#ffffff', symbol: 'circle', line: { color: '#00d2ff', width: 1 } },
                name: centerName
            };

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                margin: {l:0, r:0, b:0, t:0},
                uirevision: 'constant',
                autosize: true,
                scene: {
                    aspectmode: 'scene', 
                    xaxis: { showgrid: true, gridcolor: '#1a1a1a', color: '#666', title: 'X (km)' },
                    yaxis: { showgrid: true, gridcolor: '#1a1a1a', color: '#666', title: 'Y (km)' },
                    zaxis: { showgrid: true, gridcolor: '#1a1a1a', color: '#666', title: 'Z (km)' },
                    camera: { eye: {x: 1.5, y: 1.5, z: 1.5} }
                },
                legend: { font: { color: 'white', size: 10 }, x: 0.02, y: 0.98, bgcolor: 'rgba(0,0,0,0.5)' },
                showlegend: true
            };

            Plotly.newPlot('plot', [center, trace], layout, { responsive: true });
        }

        fetchAndPlot();
    </script>
</body>
</html>
