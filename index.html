<!DOCTYPE html>
<html>
<head>
    <title>JPL Horizons 3D Plotter</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #333; padding: 15px; border-radius: 8px; }
        input, button { padding: 8px; border-radius: 4px; border: none; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #plot { width: 100%; height: 80vh; background: #000; }
    </style>
</head>
<body>

    <h2>JPL Horizons 3D Orbit Plotter</h2>
    
    <div class="controls">
        <input type="text" id="objId" value="-144" placeholder="Object ID (e.g. -144)">
        <input type="date" id="startDate" value="2020-02-10">
        <input type="date" id="endDate" value="2021-02-10">
        <button onclick="fetchAndPlot()">Plot Trajectory</button>
    </div>

    <div id="plot"></div>

    <script>
async function fetchAndPlot() {
    const id = document.getElementById('objId').value;
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    
    // The NASA URL
const nasaUrl = "https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='499'&OBJ_DATA='NO'&MAKE_EPHEM='YES'&EPHEM_TYPE='VECTORS'&CENTER='500@10'&START_TIME='2006-01-01'&STOP_TIME='2006-01-20'&STEP_SIZE='1d'";


    // NEW PROXY: Use 'corsproxy.io' correctly or 'cors-anywhere'
    // This proxy is specifically designed to work with GitHub Pages
    const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(nasaUrl);

    try {
        const response = await fetch(proxyUrl);
        
        if (!response.ok) throw new Error(`Server responded with ${response.status}`);
        
        const data = await response.json();
        
        if (!data.result) throw new Error("NASA returned no data.");

        // --- Parsing Logic ---
       const lines = data.result.split('\n');
let inData = false;
const x = [], y = [], z = [];

lines.forEach(line => {
    // 1. Only look at lines between these markers
    if (line.includes('$$SOE')) { inData = true; return; }
    if (line.includes('$$EOE')) { inData = false; return; }
    
    if (inData) {
        // 2. Clean the line: replace commas with spaces, then split by space
        // This handles cases where JPL uses different delimiters
        const parts = line.replace(/,/g, ' ').trim().split(/\s+/);
        
        // 3. In VECTORS mode, X, Y, Z are usually at index 2, 3, 4
        // (Index 0 is Date, Index 1 is Time)
        const xVal = parseFloat(parts[2]);
        const yVal = parseFloat(parts[3]);
        const zVal = parseFloat(parts[4]);

        if (!isNaN(xVal)) {
            x.push(xVal);
            y.push(yVal);
            z.push(zVal);
        }
    }
});

console.log("Parsed Points:", x.length); // If this is 0, the loop didn't find the markers


        plotData(x, y, z, dates, id);
    } catch (err) {
        console.error(err);
        alert("CORS Error Workaround Failed: " + err.message);
    }
}
    
        function plotData(x, y, z, dates, id) {
            const trace = {
                x: x, y: y, z: z,
                mode: 'lines',
                type: 'scatter3d',
                text: dates,
                line: { width: 4, color: '#00f2ff' },
                name: `Object ${id}`
            };

            // Add the Sun at (0,0,0)
            const sun = {
                x: [0], y: [0], z: [0],
                mode: 'markers',
                type: 'scatter3d',
                marker: { size: 10, color: 'yellow' },
                name: 'Sun'
            };

            const layout = {
                paper_bgcolor: '#1a1a1a',
                plot_bgcolor: '#1a1a1a',
                margin: { l:0, r:0, b:0, t:0 },
                scene: {
                    xaxis: { title: 'X (AU)', gridcolor: '#444' },
                    yaxis: { title: 'Y (AU)', gridcolor: '#444' },
                    zaxis: { title: 'Z (AU)', gridcolor: '#444' }
                },
                legend: { font: { color: 'white' } }
            };

            Plotly.newPlot('plot', [trace, sun], layout);
        }

        // Run once on load
        fetchAndPlot();
    </script>
</body>
</html>
